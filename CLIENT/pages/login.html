<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="container">
    <h1>Dry Eye Detection</h1>

    <form id="loginForm">

        <input
            type="userName"
            id="userName"
            placeholder="userName"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        Don't have an account?
        <a href="./register.html">
            Register
        </a>
    </p>

</div>

<script src="../js/config.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
